<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>送检测试记录</title>
  <meta name="description" content="展示 testing 目录下的 Markdown 送检测试记录" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <a class="brand" href="./" aria-label="返回首页">
        <div class="brand__logo">S</div>
        <div class="brand__text">
          <div class="brand__title">Submit-testing</div>
          <div class="brand__subtitle">送检测试记录</div>
        </div>
      </a>
      <div class="source-pill">testing 目录 · Markdown 自动加载</div>
    </div>
  </header>

  <div class="page">
    <aside class="sidebar">
      <section class="panel">
        <div class="panel__head">
          <h2 class="panel__title">记录列表</h2>
          <div class="panel__sub">按路径排序，点击后在右侧查看正文。</div>
        </div>
        <div class="searchbox">
          <label for="recordSearch">筛选记录</label>
          <input id="recordSearch" type="search" placeholder="输入文件名或路径关键字" autocomplete="off" />
        </div>
        <ul class="record-list" id="recordList">
          <li class="empty">正在加载文件列表...</li>
        </ul>
      </section>
    </aside>

    <main class="content">
      <section class="main-panel card">
        <div class="toolbar">
          <div class="toolbar__left">
            <h2 class="toolbar__title" id="recordTitle">等待加载</h2>
            <div class="toolbar__meta" id="recordMeta">GitHub Pages / 本地预览均可</div>
          </div>
          <div class="status" id="globalStatus">
            <div class="loading"><span class="spinner"></span><span>正在读取记录</span></div>
          </div>
        </div>
        <article class="article" id="recordContent">
          <div class="empty">从左侧选择一个 Markdown 文件后，这里会显示内容。</div>
        </article>
      </section>
    </main>
  </div>
  <script defer src="./assets/app.js"></script>
</body>
</html>
